name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Frontend build
        run: npm ci && npm run build
        working-directory: frontend
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -p scythe-transcribe -- -D warnings
      - name: Test
        run: cargo test -p scythe-transcribe
      - name: Release build
        run: cargo build --release -p scythe-transcribe

  rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Frontend build
        run: npm ci; npm run build
        working-directory: frontend
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -p scythe-transcribe -- -D warnings
      - name: Test
        run: cargo test -p scythe-transcribe
      - name: Release build
        run: cargo build --release -p scythe-transcribe
